name: Run Spike Workflow

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */60 * * *"
  workflow_dispatch:

jobs:
  run_spike_workflow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Give permission to Spike
        run: |
          chmod +x Spike || echo "Spike file not found"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        run: |
          python Spike.py
